<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1A1B1E"/><stop offset="100%" stop-color="#0A0A0C"/></linearGradient>
    <linearGradient id="bell" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#4A76E5"/><stop offset="100%" stop-color="#3A5FC9"/></linearGradient>
    <linearGradient id="clapper" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#8B5CF6"/><stop offset="100%" stop-color="#6C3FC5"/></linearGradient>
  </defs>
  <rect width="800" height="800" rx="120" fill="url(#bg)"/>
  <circle cx="400" cy="400" r="195" stroke="#4A76E5" stroke-width="1.5" opacity="0.1"/>
  <!-- Bell -->
  <g transform="translate(400,380)">
    <path d="M-120,-40 Q-120,-140 0,-160 Q120,-140 120,-40 L130,40 Q135,60 120,60 L-120,60 Q-135,60 -130,40 Z" fill="url(#bell)"/>
    <path d="M-130,40 Q-130,80 0,100 Q130,80 130,40" stroke="url(#bell)" stroke-width="4" fill="none" opacity="0.6"/>
    <!-- Top knob -->
    <circle cx="0" cy="-145" r="15" fill="url(#bell)" opacity="0.7"/>
    <!-- Clapper -->
    <rect x="-8" y="65" width="16" height="30" rx="8" fill="url(#clapper)" opacity="0.7"/>
    <circle cx="0" cy="100" r="12" fill="url(#clapper)" opacity="0.7"/>
    <!-- Inner highlight -->
    <path d="M-100,-40 L-100,-100 Q-100,-130 0,-145 Q100,-130 100,-100 L100,-40" stroke="#93ACF5" stroke-width="1" fill="none" opacity="0.15"/>
  </g>
</svg>